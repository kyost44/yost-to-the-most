# yost-disney-destiny
# To deploy: push to GitHub, then connect the repo in the Netlify dashboard
# (Sites → Add new site → Import an existing project → GitHub → select yost-to-the-most)

[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
